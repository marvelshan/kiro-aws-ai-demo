<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="簡單的部落格系統，展示 Markdown 文章">
    <meta name="author" content="">
    <title>部落格</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <h1 class="site-title">
                    <a href="#/" id="home-link">我的部落格</a>
                </h1>
                <div class="header-actions">
                    <div class="search-container">
                        <input type="text" id="search-input" class="search-input"
                            placeholder="搜尋文章..." aria-label="搜尋文章" />
                        <button id="search-clear" class="search-clear" style="display:none;" aria-label="清除搜尋">✕</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="container" id="content">
                <div class="loading">載入中...</div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2024 我的部落格. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- Article list template -->
    <template id="article-list-template">
        <div class="article-list-layout">
            <!-- Sidebar folder tree -->
            <aside class="folder-sidebar">
                <div class="folder-header">📁 資料夾</div>
                <div id="folder-tree"></div>
            </aside>
            <!-- Main article list -->
            <div class="article-list-main">
                <h2 class="page-title">所有文章</h2>
                <div id="articles-container"></div>
            </div>
        </div>
    </template>

    <!-- Article list item template -->
    <template id="article-item-template">
        <article class="article-item">
            <h3 class="article-title">
                <a href="#" class="article-link"></a>
            </h3>
            <div class="article-meta">
                <time class="article-date"></time>
                <span class="article-read-time"><span class="read-time-value"></span> 分鐘閱讀</span>
                <span class="article-views"><span class="views-count">0</span> 次瀏覽</span>
            </div>
        </article>
    </template>

    <!-- Article detail template -->
    <template id="article-detail-template">
        <article class="article-detail">
            <div class="article-header">
                <h2 class="article-title"></h2>
                <div class="article-meta">
                    <time class="article-date"></time>
                    <span class="article-read-time"><span class="read-time-value"></span> 分鐘閱讀</span>
                    <span class="article-views"><span class="views-count">0</span> 次瀏覽</span>
                </div>
            </div>
            <div class="article-content"></div>
            <nav class="article-nav">
                <a href="#/" class="back-link">← 返回文章列表</a>
            </nav>
        </article>
    </template>

    <!-- Error template -->
    <template id="error-template">
        <div class="error-message">
            <h2 class="error-title"></h2>
            <p class="error-text"></p>
            <div class="error-actions">
                <button class="retry-button" style="display:none;">重試</button>
                <a href="#/" class="back-link" style="display:none;">返回首頁</a>
            </div>
        </div>
    </template>

    <!-- Empty state template -->
    <template id="empty-state-template">
        <div class="empty-state">
            <h2>目前還沒有文章</h2>
            <p>敬請期待更多精彩內容</p>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
